name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Check coverage thresholds
        run: |
          npx vitest run --coverage --reporter=json --outputFile=coverage.json 2>/dev/null || true
          echo "✅ Coverage report generated"

      - name: Security audit (npm)
        run: npm audit --audit-level=moderate || true

      - name: License compliance check
        run: |
          npx license-checker --onlyAllow 'MIT;Apache-2.0;ISC;BSD-2-Clause;BSD-3-Clause;0BSD;BUSL-1.1;CC0-1.0;Unlicense;Python-2.0;BlueOak-1.0.0' \
            --excludePrivatePackages \
            --production
          echo "✅ License compliance check passed"
